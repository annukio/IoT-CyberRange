version: '3.8'
services:
  # --- THE CENTRAL ROUTER / FIREWALL ---
  firewall:
    build: ../../firewall
    platform: linux/amd64
    container_name: firewall
    cap_add:
      - NET_ADMIN    # Required to run iptables
      - NET_RAW      # Required for advanced packet manipulation
    sysctls:
      - net.ipv4.ip_forward=1 # This is the correct way to enable routing
    networks:
      corporate_net:
        ipv4_address: 172.20.0.254
      iot_net:
        ipv4_address: 172.21.0.254
      ot_net:
        ipv4_address: 172.22.0.254

  # --- CORPORATE ZONE (172.20.0.0/24) ---
  corporate_ws:
    build: ../../corporate_ws
    platform: linux/amd64
    container_name: corporate_ws
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      corporate_net:
        ipv4_address: 172.20.0.10
    # Route traffic destined for IoT and OT through the firewall
    command: bash -c "ip route add 172.21.0.0/24 via 172.20.0.254 && ip route add 172.22.0.0/24 via 172.20.0.254 && sleep infinity"

# --- IOT ZONE (172.21.0.0/24) ---
  iot_api:
    build: ../../iot_api
    platform: linux/amd64
    container_name: iot_api
    cap_add:
      - NET_ADMIN
    networks:
      iot_net:
        ipv4_address: 172.21.0.10
    # Notice the '&' after the python command and the 'tail -f /dev/null' at the end!
    command: sh -c "ip route add 172.20.0.0/24 via 172.21.0.254 && ip route add 172.22.0.0/24 via 172.21.0.254 && python -m http.server 80 & tail -f /dev/null"

  iot_sensor:
    build: ../../iot_sensor
    platform: linux/amd64
    container_name: iot_sensor
    depends_on:
      - iot_api
    networks:
      iot_net:
        ipv4_address: 172.21.0.11

  # --- OT ZONE (172.22.0.0/24) ---
  legacy_os:
    build: ../../legacy_os
    platform: linux/amd64
    container_name: legacy_os
    cap_add:
      - NET_ADMIN
    networks:
      ot_net:
        ipv4_address: 172.22.0.10
    command: sh -c "ip route add 172.20.0.0/24 via 172.22.0.254 && ip route add 172.21.0.0/24 via 172.22.0.254 && /etc/init.d/openbsd-inetd start && /etc/init.d/smbd start && tail -f /dev/null"

  plc:
    build: ../../plc
    platform: linux/amd64
    container_name: plc
    cap_add:
      - NET_ADMIN
    networks:
      ot_net:
        ipv4_address: 172.22.0.11
    command: sh -c "ip route add 172.20.0.0/24 via 172.22.0.254 && ip route add 172.21.0.0/24 via 172.22.0.254 && python -m http.server 502"

  management_app:
    build: ../../management_platform
    platform: linux/amd64
    container_name: management_app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../management_platform/progress.json:/app/progress.json
    ports:
      - "3000:3000"
    networks:
      corporate_net:
        ipv4_address: 172.20.0.50 # Assigning a static IP in the Corporate range
    depends_on:
      - corporate_ws
# Define the distinct subnets
networks:
  corporate_net:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  iot_net:
    ipam:
      config:
        - subnet: 172.21.0.0/24
  ot_net:
    ipam:
      config:
        - subnet: 172.22.0.0/24
